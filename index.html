    <style>
        :root {
            --accent-gold: #F4B942;
            --accent-cyan: #3ECFCF;
            --accent-purple: #9B6DFF;
            --bg-dark: #0A0E17;
            --bg-card: #111827;
            --bg-elevated: #1A2235;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border-subtle: rgba(255,255,255,0.06);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .font-display { font-family: 'Bebas Neue', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Mesh gradient background */
        .mesh-bg {
            background: 
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(155, 109, 255, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(62, 207, 207, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 50% 20%, rgba(244, 185, 66, 0.08), transparent),
                var(--bg-dark);
        }
        
        /* Animated grid pattern */
        .grid-pattern {
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }
        
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }
        
        /* Glow effects */
        .glow-gold { box-shadow: 0 0 40px -10px rgba(244, 185, 66, 0.5); }
        .glow-cyan { box-shadow: 0 0 40px -10px rgba(62, 207, 207, 0.5); }
        .glow-purple { box-shadow: 0 0 40px -10px rgba(155, 109, 255, 0.5); }
        
        .text-glow-gold { text-shadow: 0 0 30px rgba(244, 185, 66, 0.5); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--accent-purple), var(--accent-cyan));
            border-radius: 4px;
        }
        
        /* Server card hover effects */
        .server-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-subtle);
        }
        
        .server-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(155, 109, 255, 0.3);
            box-shadow: 
                0 20px 40px -15px rgba(0,0,0,0.5),
                0 0 0 1px rgba(155, 109, 255, 0.1),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        /* Animated border gradient */
        .border-animated {
            position: relative;
            background: var(--bg-card);
            border-radius: 16px;
        }
        
        .border-animated::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 17px;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-purple), var(--accent-cyan));
            -webkit-mask: 
                linear-gradient(#fff 0 0) content-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .border-animated:hover::before { opacity: 1; }
        
        /* Tag pills */
        .tag {
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        
        .tag:hover {
            transform: scale(1.05);
        }
        
        /* Vote button */
        .vote-btn {
            background: linear-gradient(135deg, var(--accent-gold) 0%, #E6A23C 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .vote-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255,255,255,0.3) 0%,
                rgba(255,255,255,0) 50%
            );
            transform: rotate(45deg);
            transition: all 0.5s;
        }
        
        .vote-btn:hover::before {
            left: 100%;
        }
        
        .vote-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px rgba(244, 185, 66, 0.5);
        }
        
        /* Copy IP button */
        .copy-ip {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            transition: all 0.2s;
        }
        
        .copy-ip:hover {
            background: rgba(62, 207, 207, 0.1);
            border-color: var(--accent-cyan);
        }
        
        /* Status indicator */
        .status-online {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Hero floating elements */
        .float {
            animation: float 6s ease-in-out infinite;
        }
        
        .float-delay { animation-delay: -3s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        /* Input focus */
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(155, 109, 255, 0.2);
        }
        
        /* Modal backdrop */
        .modal-backdrop {
            backdrop-filter: blur(8px);
            background: rgba(10, 14, 23, 0.8);
        }
        
        /* Tab indicator */
        .tab-active {
            position: relative;
        }
        
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
            border-radius: 2px;
        }
        
        /* Rank badge styles */
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A8A8A8); }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #8B4513); }
        
        /* Featured server glow */
        .featured-glow {
            position: relative;
        }
        
        .featured-glow::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-purple));
            border-radius: 18px;
            opacity: 0.5;
            filter: blur(10px);
            z-index: -1;
        }
        
        /* Noise texture overlay */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
        }
        
        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Staggered entrance animations */
        .stagger-1 { animation: fadeSlideUp 0.6s 0.1s both; }
        .stagger-2 { animation: fadeSlideUp 0.6s 0.2s both; }
        .stagger-3 { animation: fadeSlideUp 0.6s 0.3s both; }
        .stagger-4 { animation: fadeSlideUp 0.6s 0.4s both; }
        .stagger-5 { animation: fadeSlideUp 0.6s 0.5s both; }
        
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Hero text gradient */
        .text-gradient {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-purple), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Decorative shapes */
        .shape-blob {
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }
    </style>
</head>

        // Main App
        const App = () => {
            const [servers, setServers] = useState(mockServers);
            const [activeTag, setActiveTag] = useState(null);
            const [sortBy, setSortBy] = useState('votes');
            const [searchQuery, setSearchQuery] = useState('');
            const [authModalOpen, setAuthModalOpen] = useState(false);
            const [addServerModalOpen, setAddServerModalOpen] = useState(false);
            
            const filteredServers = servers
                .filter(s => !activeTag || s.tags.includes(activeTag))
                .filter(s => !searchQuery || 
                    s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    s.ip.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    s.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))
                )
                .sort((a, b) => {
                    if (sortBy === 'votes') return b.votes - a.votes;
                    if (sortBy === 'players') return b.players.online - a.players.online;
                    if (sortBy === 'name') return a.name.localeCompare(b.name);
                    return 0;
                });
            
            const handleVote = (id) => {
                setServers(prev => prev.map(s => 
                    s.id === id ? { ...s, votes: s.votes + 1 } : s
                ));
            };
            
            return (
                <div className="min-h-screen">
                    <div className="noise-overlay" />
                    
                    <Navigation 
                        onOpenAuth={() => setAuthModalOpen(true)}
                        onOpenAddServer={() => setAddServerModalOpen(true)}
                    />
                    
                    <Hero onSearch={setSearchQuery} />
                    
                    <Stats />
                    
                    <main id="servers" className="py-20">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex items-end justify-between mb-8">
                                <div>
                                    <h2 className="font-display text-4xl md:text-5xl mb-2">TOP SERVERS</h2>
                                    <p className="text-[#94A3B8]">Ranked by community votes</p>
                                </div>
                            </div>
                            
                            <FilterBar 
                                activeTag={activeTag}
                                onTagChange={setActiveTag}
                                sortBy={sortBy}
                                onSortChange={setSortBy}
                            />
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredServers.map((server, index) => (
                                    <ServerCard 
                                        key={server.id}
                                        server={server}
                                        rank={index + 1}
                                        onVote={handleVote}
                                    />
                                ))}
                            </div>
                            
                            {filteredServers.length === 0 && (
                                <div className="text-center py-20">
                                    <Icon name="SearchX" size={48} className="mx-auto text-[#94A3B8] mb-4" />
                                    <h3 className="text-xl font-semibold mb-2">No servers found</h3>
                                    <p className="text-[#94A3B8]">Try adjusting your filters or search query</p>
                                </div>
                            )}
                            
                            <div className="flex justify-center mt-12">
                                <button className="px-8 py-4 rounded-xl bg-[#1A2235] hover:bg-[#242D42] border border-white/5 hover:border-[#9B6DFF]/30 transition-all flex items-center gap-2 font-semibold">
                                    Load More Servers
                                    <Icon name="ChevronDown" size={20} />
                                </button>
                            </div>
                        </div>
                    </main>
                    
                    <Categories />
                    
                    <Footer />
                    
                    <AuthModal isOpen={authModalOpen} onClose={() => setAuthModalOpen(false)} />
                    <AddServerModal isOpen={addServerModalOpen} onClose={() => setAddServerModalOpen(false)} />
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
